databases:
  - name: caic-db
    databaseName: caic_sourcing
    plan: free

services:
  - type: web
    name: caic-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: caic-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: caic-frontend
    runtime: static
    rootDir: frontend/src
    buildCommand: pnpm install && pnpm build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: caic-backend
          type: web
          property: hostWithScheme
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
